<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShopNexa — India's Next-Gen Store</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#ff6b2b;
  --accent2:#ff9a3c;
  --dark:#0a0a0f;
  --card:#111118;
  --card2:#18181f;
  --border:rgba(255,255,255,0.08);
  --text:#f0f0f0;
  --muted:#888;
  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
}
html,body{min-height:100%;font-family:var(--font-body);background:var(--dark);color:var(--text);overflow-x:hidden}

/* CANVAS BG */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.page-wrapper{position:relative;z-index:1;min-height:100vh}

/* NAVBAR */
.navbar{background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:64px;position:sticky;top:0;z-index:50}
.nav-logo{font-family:var(--font-display);font-size:22px;font-weight:800;background:linear-gradient(135deg,#ff6b2b,#ff9a3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;text-decoration:none}
.nav-logo small{font-size:10px;color:var(--muted);display:block;font-weight:400;-webkit-text-fill-color:var(--muted)}
.search-wrap{flex:1;display:flex;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;overflow:hidden;min-width:0}
.search-wrap input{flex:1;background:none;border:none;padding:8px 14px;color:var(--text);font-size:13px;font-family:var(--font-body);outline:none}
.search-wrap button{background:var(--accent);border:none;padding:0 14px;color:#fff;cursor:pointer;font-size:16px}
.nav-actions{display:flex;gap:10px;align-items:center;flex-shrink:0}
.nav-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;text-decoration:none;font-family:var(--font-body);transition:all .2s}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-user{color:var(--muted);font-size:13px;white-space:nowrap}
.cart-pill{background:linear-gradient(135deg,#ff6b2b,#ff9a3c);border:none;border-radius:8px;color:#fff;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:var(--font-body)}
.badge-num{background:#fff;color:#ff6b2b;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* HERO */
.hero{padding:64px 24px;text-align:center}
.hero-tag{display:inline-block;background:rgba(255,107,43,0.15);border:1px solid rgba(255,107,43,0.3);color:var(--accent);border-radius:20px;padding:4px 16px;font-size:12px;margin-bottom:16px}
.hero h1{font-family:var(--font-display);font-size:clamp(32px,6vw,64px);font-weight:800;line-height:1.1;margin-bottom:16px}
.hero h1 span{background:linear-gradient(135deg,#ff6b2b,#ff9a3c,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);font-size:16px;max-width:500px;margin:0 auto 28px}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,#ff6b2b,#ff9a3c);border:none;border-radius:10px;padding:13px 28px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity .2s,transform .1s;font-family:var(--font-body)}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:none;border:1px solid var(--border);border-radius:10px;padding:13px 28px;color:var(--text);font-size:14px;cursor:pointer;text-decoration:none;display:inline-block;transition:border-color .2s;font-family:var(--font-body)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* STATS */
.stats{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(10,10,15,0.5)}
.stat{flex:1;padding:16px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-num{font-family:var(--font-display);font-size:22px;font-weight:700;background:linear-gradient(135deg,#ff6b2b,#ff9a3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}

/* SECTIONS */
.section{padding:32px 24px}
.section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.section-hd h2{font-family:var(--font-display);font-size:20px;font-weight:700}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;text-decoration:none}
.cat-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.cat-card .cat-icon{font-size:28px;margin-bottom:8px}
.cat-card .cat-img{width:50px;height:50px;border-radius:50%;object-fit:cover;margin-bottom:8px}
.cat-card p{font-size:11px;color:var(--muted);font-weight:500}

/* PRODUCTS GRID */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
.prod-card:hover{border-color:rgba(255,107,43,0.4);transform:translateY(-3px)}
.prod-card:hover .prod-img{transform:scale(1.04)}
.prod-img-wrap{overflow:hidden;height:200px;background:#0e0e16}
.prod-img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.prod-body{padding:12px}
.prod-name{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-cat-tag{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.prod-price{font-size:17px;font-weight:700;color:#fff;margin-top:6px}
.prod-delivery{font-size:11px;color:#42a5f5;margin-top:4px}
.prod-add{width:100%;background:rgba(255,107,43,0.12);border:1px solid rgba(255,107,43,0.3);border-radius:8px;color:var(--accent);font-size:12px;font-weight:600;padding:8px;cursor:pointer;margin-top:10px;transition:all .2s;font-family:var(--font-body)}
.prod-add:hover{background:var(--accent);color:#fff}
.empty-msg{color:var(--muted);grid-column:1/-1;text-align:center;padding:40px;font-size:15px}

/* PRODUCT DETAIL */
.detail-container{max-width:1000px;margin:0 auto;padding:32px 24px}
.back-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:8px 16px;font-size:13px;cursor:pointer;margin-bottom:24px;display:inline-flex;align-items:center;gap:6px;font-family:var(--font-body);text-decoration:none;transition:all .2s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.detail-layout{display:grid;grid-template-columns:1fr 1fr;gap:32px}
@media(max-width:680px){.detail-layout{grid-template-columns:1fr}}
.detail-img-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;height:380px}
.detail-img{width:100%;height:100%;object-fit:cover}
.detail-name{font-family:var(--font-display);font-size:26px;font-weight:700;line-height:1.3;margin-bottom:10px}
.detail-cat{font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.detail-price-box{background:rgba(255,107,43,0.08);border:1px solid rgba(255,107,43,0.2);border-radius:12px;padding:16px;margin-bottom:20px}
.detail-price{font-family:var(--font-display);font-size:34px;font-weight:800;color:#fff}
.detail-prime{font-size:13px;color:#42a5f5;margin-top:6px}
.detail-desc{font-size:14px;color:#aaa;line-height:1.8;margin-bottom:24px}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-buy{flex:1;background:linear-gradient(135deg,#ff6b2b,#ff9a3c);border:none;border-radius:10px;padding:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-body);min-width:130px;text-decoration:none;text-align:center;display:inline-flex;align-items:center;justify-content:center}
.btn-fav{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-body);min-width:130px;text-decoration:none;text-align:center;display:inline-flex;align-items:center;justify-content:center;transition:all .2s}
.btn-fav:hover{border-color:var(--accent);color:var(--accent)}
.btn-fav-remove{flex:1;background:rgba(255,107,43,0.1);border:1px solid rgba(255,107,43,0.4);border-radius:10px;padding:14px;color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-body);min-width:130px;text-decoration:none;text-align:center;display:inline-flex;align-items:center;justify-content:center}

/* CART DRAWER */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:90;display:none}
.cart-overlay.open{display:block}
.cart-drawer{position:fixed;top:0;right:0;height:100%;width:360px;background:var(--card);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .3s;overflow-y:auto;padding:24px}
.cart-drawer.open{transform:translateX(0)}
.cart-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.cart-hd h3{font-family:var(--font-display);font-size:18px;font-weight:700}
.cart-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.cart-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.cart-item img{width:60px;height:60px;border-radius:8px;object-fit:cover}
.cart-item-info{flex:1}
.cart-item-name{font-size:13px;font-weight:500;line-height:1.4}
.cart-item-price{font-size:14px;font-weight:700;color:var(--accent);margin-top:4px}
.cart-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px}
.cart-total-box{margin-top:16px;padding:16px;background:rgba(255,107,43,0.08);border-radius:10px}
.cart-total-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px}
.cart-total-row.big{font-weight:700;font-size:16px;color:#fff}
.checkout-btn{width:100%;background:linear-gradient(135deg,#ff6b2b,#ff9a3c);border:none;border-radius:10px;padding:13px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;font-family:var(--font-body)}
.cart-empty-msg{color:var(--muted);text-align:center;padding:20px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a24;border:1px solid rgba(76,175,80,0.4);color:#4caf50;padding:12px 20px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ALERTS */
.alert-box{background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.3);color:#ff6b6b;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:16px;text-align:center}
.alert-success{background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);color:#4caf50}

/* FOOTER */
.footer{background:rgba(10,10,15,0.9);border-top:1px solid var(--border);padding:32px 24px;text-align:center;color:var(--muted);font-size:12px;margin-top:auto}
.footer-logo{font-family:var(--font-display);font-size:20px;font-weight:800;background:linear-gradient(135deg,#ff6b2b,#ff9a3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.footer-links a{color:var(--muted);margin:0 8px;text-decoration:none}
.footer-links a:hover{color:var(--accent)}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="toast" id="toast"></div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-hd">
    <h3>🛒 Your Cart</h3>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div id="cartItems"></div>
  <div class="cart-total-box" id="cartTotal" style="display:none">
    <div class="cart-total-row"><span>Subtotal</span><span id="cartSubtotalDisplay">₹0</span></div>
    <div class="cart-total-row"><span>Delivery</span><span style="color:#4caf50">FREE</span></div>
    <div class="cart-total-row big"><span>Total</span><span id="cartTotalDisplay">₹0</span></div>
    <button class="checkout-btn" onclick="showToastMsg('🚧 Checkout coming soon!')">Proceed to Checkout →</button>
  </div>
</div>

<div class="page-wrapper">
  {% include 'navbar.html' %}
  {% block content %}{% endblock %}
</div>

<script>
// ===== CANVAS BLUE BACKGROUND =====
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}

class Particle{
  constructor(){this.reset();}
  reset(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=Math.random()*2+0.5;
    this.speedX=(Math.random()-0.5)*0.4;
    this.speedY=(Math.random()-0.5)*0.4;
    this.opacity=Math.random()*0.5+0.1;
    this.hue=Math.random()*40+200;
  }
  update(){
    this.x+=this.speedX;this.y+=this.speedY;
    if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset();
  }
  draw(){
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.hue},80%,60%,${this.opacity})`;ctx.fill();
  }
}

function initParticles(){particles=[];for(let i=0;i<80;i++)particles.push(new Particle());}

function animateBg(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const g=ctx.createRadialGradient(canvas.width*0.3,canvas.height*0.3,0,canvas.width*0.5,canvas.height*0.5,canvas.width*0.8);
  g.addColorStop(0,'rgba(30,80,255,0.08)');
  g.addColorStop(0.5,'rgba(5,10,30,0.95)');
  g.addColorStop(1,'rgba(2,4,18,1)');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw();});
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<100){
        ctx.beginPath();
        ctx.strokeStyle=`rgba(40,120,255,${0.12*(1-dist/100)})`;
        ctx.lineWidth=0.5;ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animateBg);
}
window.addEventListener('resize',()=>{resizeCanvas();initParticles();});
resizeCanvas();initParticles();animateBg();

// ===== CART =====
let cart = [];

function addToCart(id, name, price, img){
  const existing = cart.find(i => i.id === id);
  if(existing){ existing.qty++; }
  else{ cart.push({id, name, price, img, qty:1}); }
  updateCartCount();
  showToastMsg('✅ Added to cart!');
}

function updateCartCount(){
  const total = cart.reduce((s,i)=>s+i.qty,0);
  document.querySelectorAll('.cart-count-badge').forEach(el=>el.textContent=total);
}

function openCart(){
  const ci = document.getElementById('cartItems');
  const ct = document.getElementById('cartTotal');
  if(!cart.length){
    ci.innerHTML='<p class="cart-empty-msg">Your cart is empty 🛒</p>';
    ct.style.display='none';
  } else {
    ci.innerHTML = cart.map(i=>`
      <div class="cart-item">
        <img src="${i.img}" alt="${i.name}"/>
        <div class="cart-item-info">
          <div class="cart-item-name">${i.name}</div>
          <div class="cart-item-price">₹${(i.price*i.qty).toLocaleString('en-IN')} ${i.qty>1?'(x'+i.qty+')':''}</div>
        </div>
        <button class="cart-remove" onclick="removeFromCart(${i.id})">🗑</button>
      </div>
    `).join('');
    const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
    document.getElementById('cartSubtotalDisplay').textContent='₹'+subtotal.toLocaleString('en-IN');
    document.getElementById('cartTotalDisplay').textContent='₹'+subtotal.toLocaleString('en-IN');
    ct.style.display='block';
  }
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
}

function closeCart(){
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
}

function removeFromCart(id){
  cart = cart.filter(i=>i.id!==id);
  updateCartCount();
  openCart();
}

// ===== TOAST =====
function showToastMsg(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
