<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up — ShopNexa</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#ff6b2b;--accent2:#ff9a3c;--dark:#0a0a0f;--card:#111118;--border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#888;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
html,body{min-height:100%;font-family:var(--font-body);background:var(--dark);color:var(--text);overflow-x:hidden}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.signup-page{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px}
.signup-box{background:rgba(17,17,24,0.88);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:440px;text-align:center}
.login-logo{font-family:var(--font-display);font-size:32px;font-weight:800;background:linear-gradient(135deg,#ff6b2b,#ff9a3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.signup-box h2{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:24px}
.field{text-align:left;margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;font-family:var(--font-body);outline:none;transition:border .2s}
.field input:focus{border-color:var(--accent)}
.signup-btn{width:100%;background:linear-gradient(135deg,#ff6b2b,#ff9a3c);border:none;border-radius:10px;padding:13px;color:#fff;font-size:15px;font-weight:600;font-family:var(--font-body);cursor:pointer;margin-top:8px;transition:opacity .2s}
.signup-btn:hover{opacity:.9}
.alert-box{background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.3);color:#ff6b6b;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.login-hint{color:var(--muted);font-size:13px;margin-top:20px}
.login-hint a{color:var(--accent);text-decoration:none}
.login-hint a:hover{text-decoration:underline}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="signup-page">
  <div class="signup-box">
    <div class="login-logo">ShopNexa</div>
    <div class="login-sub">shopnexa.in</div>
    <h2>Create Account 🎉</h2>

    {% if error %}
    <div class="alert-box">❌ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'signup' %}">
      {% csrf_token %}
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required autofocus/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a password" required/>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Repeat your password" required/>
      </div>
      <button class="signup-btn" type="submit">Create Account →</button>
    </form>

    <div class="login-hint">
      Already have an account? <a href="{% url 'login' %}">Sign In</a>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('bgCanvas');const ctx=canvas.getContext('2d');let particles=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
class Particle{constructor(){this.reset();}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.speedX=(Math.random()-0.5)*0.4;this.speedY=(Math.random()-0.5)*0.4;this.opacity=Math.random()*0.5+0.1;this.hue=Math.random()*40+200;}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset();}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`hsla(${this.hue},80%,60%,${this.opacity})`;ctx.fill();}}
function initParticles(){particles=[];for(let i=0;i<80;i++)particles.push(new Particle());}
function animateBg(){ctx.clearRect(0,0,canvas.width,canvas.height);const g=ctx.createRadialGradient(canvas.width*0.3,canvas.height*0.3,0,canvas.width*0.5,canvas.height*0.5,canvas.width*0.8);g.addColorStop(0,'rgba(30,80,255,0.08)');g.addColorStop(0.5,'rgba(5,10,30,0.95)');g.addColorStop(1,'rgba(2,4,18,1)');ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animateBg);}
window.addEventListener('resize',()=>{resizeCanvas();initParticles();});
resizeCanvas();initParticles();animateBg();
</script>
</body>
</html>
