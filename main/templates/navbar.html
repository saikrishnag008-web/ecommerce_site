<nav class="navbar">
  <a class="nav-logo" href="{% url 'home' %}">
    ShopNexa
    <small>shopnexa.in</small>
  </a>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search products, brands, categories..." />
    <button onclick="handleSearch()">🔍</button>
  </div>

  <div class="nav-actions">
    {% if user.is_authenticated %}
      <span class="nav-user">👤 Hi, <strong>{{ user.username }}</strong></span>
      <a href="{% url 'logout' %}" class="nav-btn">Logout</a>
    {% else %}
      <a href="{% url 'login' %}" class="nav-btn">Login</a>
      <a href="{% url 'signup' %}" class="nav-btn">Sign Up</a>
    {% endif %}
    <button class="cart-pill" onclick="openCart()">
      🛒 Cart <span class="badge-num cart-count-badge">0</span>
    </button>
  </div>
</nav>

<script>
function handleSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if(q) window.location.href = "{% url 'home' %}?q=" + encodeURIComponent(q);
}
document.getElementById('searchInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') handleSearch();
});
</script>
