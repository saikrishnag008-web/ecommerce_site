<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — ShopNexa</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#ff6b2b;--dark:#0a0a0f;--border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#888;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
html,body{height:100%;font-family:var(--font-body);background:var(--dark);color:var(--text);}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.notfound-page{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.notfound-box{background:rgba(17,17,24,0.88);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:20px;padding:48px 40px;max-width:420px}
.notfound-code{font-family:var(--font-display);font-size:80px;font-weight:800;background:linear-gradient(135deg,#ff6b2b,#ff9a3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.notfound-box h2{font-family:var(--font-display);font-size:24px;margin:12px 0 8px}
.notfound-box p{color:var(--muted);font-size:14px;margin-bottom:24px}
.home-btn{background:linear-gradient(135deg,#ff6b2b,#ff9a3c);border:none;border-radius:10px;padding:13px 28px;color:#fff;font-size:14px;font-weight:600;text-decoration:none;display:inline-block;font-family:var(--font-body)}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="notfound-page">
  <div class="notfound-box">
    <div class="notfound-code">404</div>
    <h2>Page Not Found</h2>
    <p>Oops! The page you're looking for doesn't exist or has been moved.</p>
    <a href="{% url 'home' %}" class="home-btn">← Back to ShopNexa</a>
  </div>
</div>
<script>
const canvas=document.getElementById('bgCanvas');const ctx=canvas.getContext('2d');let particles=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
class Particle{constructor(){this.reset();}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+0.5;this.speedX=(Math.random()-0.5)*0.4;this.speedY=(Math.random()-0.5)*0.4;this.opacity=Math.random()*0.5+0.1;this.hue=Math.random()*40+200;}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset();}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`hsla(${this.hue},80%,60%,${this.opacity})`;ctx.fill();}}
function initParticles(){particles=[];for(let i=0;i<80;i++)particles.push(new Particle());}
function animateBg(){ctx.clearRect(0,0,canvas.width,canvas.height);const g=ctx.createRadialGradient(canvas.width*0.3,canvas.height*0.3,0,canvas.width*0.5,canvas.height*0.5,canvas.width*0.8);g.addColorStop(0,'rgba(30,80,255,0.08)');g.addColorStop(0.5,'rgba(5,10,30,0.95)');g.addColorStop(1,'rgba(2,4,18,1)');ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animateBg);}
window.addEventListener('resize',()=>{resizeCanvas();initParticles();});
resizeCanvas();initParticles();animateBg();
</script>
</body>
</html>
